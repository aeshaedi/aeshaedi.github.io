<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aeshaedi</title>
    <link rel="icon" type="image/x-icon" href="/assets/aeshaedi-favicon.png">
    <meta name="description" content="Aeshaedi personal web page">
    <meta name="keywords" content="Aeshaedi">
    <meta name="author" content="Aeshaedi">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div>
        <div style="display:flex;align-items: center;"><img width="50px" height="50px" class="pixel"
                src="/assets/aeshaedi-icon.png" alt="Aeshaedi icon">
            <h1><a href="/" style="color: unset">Aeshaedi</a></h1>
        </div>
        <hr>

        <h2>RPG Game</h2>

        <div id="showUserStats" style="display: none;">
            <p><span id="displayName"></span> Level 1</p>
            <p>What you wanna do?</p>
            <button>Train</button>
            <button>Combat</button>
        </div>
        <div id="getUserNameDiv" style="display: none;">
            <p>What is your name?</p>
            <input type="text" id="getUserName">
            <button onclick="getUsername()">Okay</button>
        </div>
        <hr>
        <p>You've stayed <span id="counterDisplay">0</span> seconds here</p>
        <p>You've visited this site <span id="visitsDisplay"></span> times</p>
        <hr>
        <p>Contact me at <a href="mailto:aeshaedi@gmail.com">aeshaedi@gmail.com</a></p>
    </div>

    <p style="text-align: center;">web by aeshaedi 2024</p>

    <script>
        

        var username = localStorage.getItem("username")
        if (username == null){
            getUserNameDiv.style.display = "block"
        }
        else {            
            showUserStats.style.display = "block"
            displayName.textContent = username
        }

        var interval = setInterval(counting, 1000)
        var seconds = 0
       
        var counterDisplay = document.getElementById("counterDisplay")

        function getUsername(){
            username = getUserName.value;
            displayName.textContent = username
            localStorage.setItem("username", username)
            showUserStats.style.display = "block"
            getUserNameDiv.style.display = "none"
        }

        function counting() {
            seconds++
            counterDisplay.textContent = seconds
        }
        var visitsDisplay = document.getElementById("visitsDisplay")
        var visits = localStorage.getItem("visits")
        if (visits == null) {
            visits = 0
        }
        visits++
        localStorage.setItem("visits", visits)
        visitsDisplay.textContent = visits


    </script>
</body>

</html>
